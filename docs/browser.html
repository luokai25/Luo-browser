<!DOCTYPE html>
<html>
<head>
<title>Luo Browser</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#202124;--bg2:#292a2d;--bg3:#323639;--border:#3c4043;--text:#e8eaed;--text2:#9aa0a6;--accent:#8ab4f8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{background:var(--bg);padding:8px 8px 0;display:flex;flex-direction:column;gap:0}
#tabs{display:flex;align-items:flex-end;gap:2px;overflow-x:auto;padding:0 4px}
.tab{height:36px;min-width:100px;max-width:180px;padding:0 4px 0 10px;background:var(--bg2);border:none;border-radius:8px 8px 0 0;color:var(--text2);font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;position:relative;flex-shrink:0}
.tab.active{background:var(--bg3);color:var(--text);flex:1}
.tab-icon{font-size:14px;flex-shrink:0}
.tab-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:left;min-width:0}
.tab-close{font-size:14px;opacity:0;padding:2px 6px;border-radius:4px;flex-shrink:0}
.tab:hover .tab-close{opacity:0.7;background:rgba(255,255,255,0.1)}
.tab-close:hover{opacity:1;background:#f44336!important;color:#fff}
.tab.loading .tab-icon{animation:spin 1s linear infinite}
@keyframes spin{to{transform:360deg}}
.new-tab{width:36px;height:36px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;border-radius:8px 8px 0 0;flex-shrink:0}
.new-tab:hover{background:var(--border)}
#toolbar{display:flex;align-items:center;gap:4px;padding:8px}
.nav-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;border-radius:50%;flex-shrink:0}
.nav-btn:hover{background:var(--border);color:var(--text)}
#urlbar{flex:1;height:32px;padding:0 12px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
#urlbar:focus{border-color:var(--accent);background:var(--bg3)}
#urlbar.secure{border-color:#4caf50}
#urlbar.warning{border-color:#ff9800}
#urlbar.danger{border-color:#f44336}
#urlicons{display:flex;gap:4px;margin-left:8px}
.url-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);cursor:pointer}
.url-icon:hover{color:var(--text)}
#bookmarks{background:var(--bg2);padding:4px 8px;display:flex;gap:4px;overflow-x:auto;flex-shrink:0}
.bookmark{height:24px;padding:0 10px;background:var(--bg3);border:none;border-radius:4px;color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.bookmark:hover{background:var(--border)}
#content{flex:1;position:relative;background:#fff}
iframe{width:100%;height:100%;border:none;background:#fff}
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:9999}
#overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:12px;padding:24px;min-width:400px;max-width:600px;max-height:80vh;overflow:auto;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.modal h2{margin:0 0 16px;font-size:18px;font-weight:500}
.close-modal{float:right;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}
.list-item{padding:10px 12px;display:flex;align-items:center;gap:12px;border-radius:8px;cursor:pointer}
.list-item:hover{background:var(--bg3)}
.list-icon{font-size:20px}
.list-text{flex:1;min-width:0}
.list-title{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-sub{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-action{color:var(--accent);font-size:12px}
.input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:12px}
.input:focus{outline:none;border-color:var(--accent)}
.btn{background:var(--accent);color:#000;border:none;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;cursor:pointer}
.btn:hover{opacity:0.9}
.btn-secondary{background:var(--bg3);color:var(--text)}
#status{background:var(--bg3);padding:4px 12px;font-size:11px;color:var(--text2);display:flex;justify-content:space-between;flex-shrink:0}
.status-item{cursor:pointer}
.status-item:hover{color:var(--text)}
#downloads{position:fixed;bottom:50px;right:20px;background:var(--bg2);border-radius:8px;padding:8px;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.4);z-index:1000}
#downloads.show{display:block}
.download-item{background:var(--bg);padding:8px 12px;border-radius:4px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.download-icon{font-size:20px}
.download-info{flex:1}
.download-name{font-size:13px}
.download-progress{font-size:11px;color:var(--text2)}
</style>
</head>
<body>
<div id="header">
<div id="tabs"><button class="tab active" data-id="1"><span class="tab-icon">🌐</span><span class="tab-title">New Tab</span><span class="tab-close">×</span></button><button class="new-tab">+</button></div>
<div id="toolbar">
<button class="nav-btn" id="back" title="Back">←</button>
<button class="nav-btn" id="forward" title="Forward">→</button>
<button class="nav-btn" id="refresh" title="Refresh">↻</button>
<button class="nav-btn" id="home" title="Home">🏠</button>
<input type="text" id="urlbar" placeholder="Search or enter URL">
<div id="urlicons"><span class="url-icon" id="lock" title="Connection">🔒</span><span class="url-icon" id="star" title="Bookmark">★</span></div>
</div>
<div id="bookmarks"></div>
</div>
<div id="content"><iframe id="frame" src="https://google.com"></iframe></div>
<div id="status">
<div><span id="status-text">Done</span></div>
<div><span class="status-item" onclick="showModal('history')">History</span> · <span class="status-item" onclick="showModal('downloads')">Downloads</span> · <span class="status-item" onclick="showModal('bookmarks')">Bookmarks</span></div>
</div>
<div id="overlay"><div class="modal"><button class="close-modal" onclick="hideModal()">×</button><div id="modal-content"></div></div></div>
<script>
var tabs=[{id:1,url:'https://google.com',title:'Google',icon:'🌐',loading:false}];
var activeTab=1;
var tabId=2;
var bookmarks=JSON.parse(localStorage.getItem('luo-bookmarks')||'[]');
var history=JSON.parse(localStorage.getItem('luo-history')||'[]');
var downloads=[];

function renderTabs(){
  var html=tabs.map(t=>'<button class="tab '+(t.id===activeTab?'active':'')+(t.loading?' loading':'')+'" data-id="'+t.id+'"><span class="tab-icon">'+t.icon+'</span><span class="tab-title">'+(t.title||'New Tab')+'</span><span class="tab-close" onclick="event.stopPropagation();closeTab('+t.id+')">×</span></button>').join('');
  html+='<button class="new-tab" onclick="newTab()">+</button>';
  document.getElementById('tabs').innerHTML=html;
  document.querySelectorAll('.tab').forEach(el=>el.onclick=function(){switchTab(parseInt(this.dataset.id))});
}

function newTab(){
  var id=tabId++;
  tabs.push({id,url:'https://google.com',title:'New Tab',icon:'🌐',loading:false});
  switchTab(id);
}

function closeTab(id){
  if(tabs.length<=1)return;
  var idx=tabs.findIndex(t=>t.id===(id||activeTab));
  tabs.splice(idx,1);
  if(activeTab===id||!tabs.find(t=>t.id===activeTab)){
    activeTab=tabs[Math.max(0,idx-1)].id;
  }
  renderTabs();
  loadTab(activeTab);
}

function switchTab(id){
  activeTab=id;
  renderTabs();
  loadTab(id);
}

function loadTab(id){
  var t=tabs.find(tab=>tab.id===id);
  document.getElementById('frame').src=t.url;
  document.getElementById('urlbar').value=t.url;
  updateTabIcon();
}

function updateTabIcon(){
  var t=tabs.find(tab=>tab.id===activeTab);
  document.getElementById('lock').textContent=t.url.startsWith('https')?'🔒':'🔓';
  document.getElementById('urlbar').className=t.url.startsWith('https')?'secure':'';
}

var loadTimer;
document.getElementById('frame').onload=function(){
  clearTimeout(loadTimer);
  var t=tabs.find(tab=>tab.id===activeTab);
  if(t){
    try{
      t.title=document.getElementById('frame').contentDocument.title;
      t.icon='🌐';
    }catch(e){}
    history.unshift({url:t.url,title:t.title,time:Date.now()});
    localStorage.setItem('luo-history',JSON.stringify(history.slice(0,200)));
  }
  renderTabs();
  updateTabIcon();
  document.getElementById('status-text').textContent='Done';
};

document.getElementById('frame').onloadstart=function(){
  var t=tabs.find(tab=>tab.id===activeTab);
  if(t)t.loading=true;
  renderTabs();
  loadTimer=setTimeout(function(){
    document.getElementById('status-text').textContent='Loading...';
  },500);
};

document.getElementById('urlbar').onkeydown=function(e){
  if(e.key==='Enter'){
    var input=this.value.trim();
    var url=input;
    if(!input.startsWith('http')&&!input.includes('.')&&!input.startsWith('localhost')){
      url='https://www.google.com/search?q='+encodeURIComponent(input);
    }else if(!input.startsWith('http')&&!input.includes('://')){
      url='https://'+input;
    }
    var t=tabs.find(tab=>tab.id===activeTab);
    t.url=url;
    document.getElementById('frame').src=url;
  }
};

document.getElementById('back').onclick=function(){try{document.getElementById('frame').contentWindow.history.back()}catch(e){}};
document.getElementById('forward').onclick=function(){try{document.getElementById('frame').contentWindow.history.forward()}catch(e){}};
document.getElementById('refresh').onclick=function(){document.getElementById('frame').src=document.getElementById('frame').src};
document.getElementById('home').onclick=function(){document.getElementById('frame').src='https://google.com'};
document.getElementById('star').onclick=addBookmark;

function renderBookmarks(){
  var html=bookmarks.map(b=>'<button class="bookmark" data-url="'+b.url+'">'+b.title+'</button>').join('');
  document.getElementById('bookmarks').innerHTML=html;
  document.querySelectorAll('#bookmarks .bookmark').forEach(b=>b.onclick=function(){document.getElementById('frame').src=this.dataset.url});
}
renderBookmarks();

function addBookmark(){
  var t=tabs.find(tab=>tab.id===activeTab);
  if(t&&!bookmarks.find(b=>b.url===t.url)){
    bookmarks.push({url:t.url,title:t.title});
    localStorage.setItem('luo-bookmarks',JSON.stringify(bookmarks));
    renderBookmarks();
  }
}

function showModal(type){
  var content=document.getElementById('modal-content');
  if(type==='history'){
    content.innerHTML='<h2>History</h2>'+history.slice(0,20).map(h=>'<div class="list-item" onclick="goTo(\''+h.url+'\')"><span class="list-icon">🌐</span><div class="list-text"><div class="list-title">'+(h.title||'Untitled')+'</div><div class="list-sub">'+h.url+'</div></div></div>').join('');
  }else if(type==='bookmarks'){
    content.innerHTML='<h2>Bookmarks</h2><input type="text" class="input" id="bm-title" placeholder="Title"><input type="text" class="input" id="bm-url" placeholder="URL"><button class="btn" onclick="saveBookmark()">Add Bookmark</button><br><br>'+bookmarks.map(b=>'<div class="list-item"><span class="list-icon">🌐</span><div class="list-text"><div class="list-title">'+b.title+'</div><div class="list-sub">'+b.url+'</div></div><span class="list-action" onclick="removeBookmark(\''+b.url+'\')">Remove</span></div>').join('');
  }else if(type==='downloads'){
    content.innerHTML='<h2>Downloads</h2>'+(downloads.length?downloads.map(d=>'<div class="download-item"><span class="download-icon">📄</span><div class="download-info"><div class="download-name">'+d.name+'</div><div class="download-progress">'+d.status+'</div></div>').join('<div class="download-item"><span>No downloads yet</span></div>'));
  }
  document.getElementById('overlay').classList.add('show');
}

function hideModal(){
  document.getElementById('overlay').classList.remove('show');
}

function goTo(url){
  document.getElementById('frame').src=url;
  hideModal();
}

function saveBookmark(){
  var title=document.getElementById('bm-title').value;
  var url=document.getElementById('bm-url').value;
  if(title&&url){
    bookmarks.push({url,title});
    localStorage.setItem('luo-bookmarks',JSON.stringify(bookmarks));
    renderBookmarks();
    showModal('bookmarks');
  }
}

function removeBookmark(url){
  bookmarks=bookmarks.filter(b=>b.url!==url);
  localStorage.setItem('luo-bookmarks',JSON.stringify(bookmarks));
  showModal('bookmarks');
}

renderTabs();
</script>
</body>
</html>
