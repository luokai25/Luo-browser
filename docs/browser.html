<!DOCTYPE html>
<html>
<head>
<title>Luo Browser</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#202124;--bg2:#292a2d;--bg3:#323639;--border:#3c4043;--text:#e8eaed;--text2:#9aa0a6;--accent:#8ab4f8;--success:#81c995;--danger:#f44336}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{background:var(--bg);padding:8px 8px 0}
#tabs{display:flex;align-items:flex-end;gap:2px;overflow-x:auto;padding:0 4px}
.tab{height:36px;min-width:100px;max-width:180px;padding:0 10px;background:var(--bg2);border:none;border-radius:8px 8px 0 0;color:var(--text2);font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;flex:1}
.tab.active{background:var(--bg3);color:var(--text)}
.tab-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.tab-close{font-size:14px;opacity:0}
.tab:hover .tab-close{opacity:0.7}
.tab-close:hover{opacity:1;background:var(--danger);color:#fff}
.new-tab{width:36px;height:36px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}
#toolbar{display:flex;align-items:center;gap:4px;padding:8px}
.nav-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;border-radius:50%}
.nav-btn:hover{background:var(--border);color:var(--text)}
#urlbar{flex:1;height:36px;padding:0 16px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;color:var(--text);font-size:15px;outline:none;position:relative}
#urlbar:focus{border-color:var(--accent);background:var(--bg3)}
#suggestions{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:0 0 12px 12px;max-height:400px;overflow-y:auto;display:none;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
#suggestions.show{display:block}
.suggestion{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.suggestion:hover{background:var(--bg3)}
.suggestion-icon{font-size:18px}
.suggestion-text{flex:1}
.suggestion-title{font-size:14px}
.suggestion-url{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.suggestion-count{font-size:11px;color:var(--accent);background:var(--bg);padding:2px 8px;border-radius:10px}
.suggestion-new{font-size:10px;color:var(--success);background:rgba(129,201,149,0.2);padding:2px 6px;border-radius:4px}
#smart-bar{background:linear-gradient(90deg,var(--bg2),var(--bg3));padding:8px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.smart-chip{background:var(--bg);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;border:1px solid var(--border);transition:all 0.2s}
.smart-chip:hover{background:var(--border);transform:translateY(-1px)}
.smart-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.chip-icon{font-size:14px}
#content{flex:1;position:relative}
iframe{width:100%;height:100%;border:none;background:#fff}
#status{background:var(--bg3);padding:4px 12px;font-size:11px;color:var(--text2);display:flex;justify-content:space-between}
</style>
</head>
<body>
<div id="header">
<div id="tabs"><button class="tab active" data-id="1"><span class="tab-title">New Tab</span><span class="tab-close">×</span></button><button class="new-tab">+</button></div>
<div id="toolbar">
<button class="nav-btn" id="back">←</button>
<button class="nav-btn" id="forward">→</button>
<button class="nav-btn" id="refresh">↻</button>
<button class="nav-btn" id="home">🏠</button>
<input type="text" id="urlbar" placeholder="Search or enter URL" autocomplete="off">
</div>
<div id="smart-bar"></div>
</div>
<div id="suggestions"></div>
<div id="content"><iframe id="frame" src="https://google.com"></iframe></div>
<div id="status"><span id="status-text">Done</span><span>Luo Browser with Smart Search</span></div>
<script>
// Smart Search System with Self-Learning
class SmartSearch {
  constructor(){
    this.history=JSON.parse(localStorage.getItem('luo-search-history')||'[]');
    this.quickLinks=JSON.parse(localStorage.getItem('luo-quick-links')||'[]');
    this.learnedTerms={};
    this.popularSites=this.getPopularSites();
    this.init();
  }
  
  getPopularSites(){
    return [
      {name:'Google',url:'https://google.com',icon:'🔍',category:'search'},
      {name:'YouTube',url:'https://youtube.com',icon:'▶️',category:'video'},
      {name:'GitHub',url:'https://github.com',icon:'🐙',category:'code'},
      {name:'Twitter',url:'https://twitter.com',icon:'🐦',category:'social'},
      {name:'Reddit',url:'https://reddit.com',icon:'🤖',category:'social'},
      {name:'Wikipedia',url:'https://wikipedia.org',icon:'📚',category:'reference'},
      {name:'Amazon',url:'https://amazon.com',icon:'🛒',category:'shopping'},
      {name:'Netflix',url:'https://netflix.com',icon:'🎬',category:'video'},
      {name:'Spotify',url:'https://spotify.com',icon:'🎵',category:'music'},
      {name:'Stack Overflow',url:'https://stackoverflow.com',icon:'📚',category:'code'},
      {name:'Discord',url:'https://discord.com',icon:'💬',category:'social'},
      {name:'Twitch',url:'https://twitch.tv',icon:'🎮',category:'gaming'},
      {name:'LinkedIn',url:'https://linkedin.com',icon:'💼',category:'work'},
      {name:'Medium',url:'https://medium.com',icon:'📝',category:'reading'},
      {name:'Notion',url:'https://notion.so',icon:'📓',category:'productivity'},
      {name:'Figma',url:'https://figma.com',icon:'🎨',category:'design'},
      {name:'Canva',url:'https://canva.com',icon:'✏️',category:'design'},
      {name:'ChatGPT',url:'https://chat.openai.com',icon:'🤖',category:'ai'},
      {name:'Claude',url:'https://claude.ai',icon:'🧠',category:'ai'},
      {name:'DeepSeek',url:'https://deepseek.com',icon:'🔮',category:'ai'},
      {name:'Perplexity',url:'https://perplexity.ai',icon:'🔍',category:'ai'},
      {name:'Gmail',url:'https://gmail.com',icon:'📧',category:'email'},
      {name:'Google Drive',url:'https://drive.google.com',icon:'💾',category:'storage'},
      {name:'Dropbox',url:'https://dropbox.com',icon:'📦',category:'storage'},
    ];
  }
  
  init(){
    this.processHistory();
    this.renderSmartBar();
  }
  
  processHistory(){
    // Convert history array to learned terms with weights
    this.history.forEach(item=>{
      const term=item.query.toLowerCase();
      if(!this.learnedTerms[term]){
        this.learnedTerms[term]={count:0,results:[],lastUsed:0};
      }
      this.learnedTerms[term].count++;
      this.learnedTerms[term].lastUsed=item.time;
      if(item.results)this.learnedTerms[term].results=item.results;
    });
  }
  
  search(query){
    if(!query||query.length<1)return[];
    
    const q=query.toLowerCase();
    let results=[];
    
    // 1. First: User's most frequent searches (learned)
    const learned=Object.entries(this.learnedTerms)
      .filter(([term])=>term.includes(q))
      .sort((a,b)=>b[1].count-a[1].count)
      .slice(0,3)
      .map(([term,data])=>({title:term,url:data.results?.[0]||'https://google.com/search?q='+encodeURIComponent(term),icon:'🧠',type:'learned',count:data.count}));
    
    // 2. Second: Popular sites matching query
    const sites=this.popularSites
      .filter(site=>site.name.toLowerCase().includes(q)||site.category.toLowerCase().includes(q))
      .slice(0,4)
      .map(site=>({...site,type:'site'}));
    
    // 3. Third: Google search suggestion
    results=[...learned,...sites];
    if(results.length<5){
      results.push({name:'Search Google for "'+query+'"',url:'https://google.com/search?q='+encodeURIComponent(query),icon:'🔍',title:'Search: '+query,type:'search'});
    }
    
    return results;
  }
  
  addToHistory(query,results=[]){
    this.history.unshift({query,results:results.map(r=>r.url),time:Date.now()});
    this.history=this.history.slice(0,500); // Keep last 500
    localStorage.setItem('luo-search-history',JSON.stringify(this.history));
    this.processHistory();
    this.renderSmartBar();
  }
  
  getSuggestions(){
    // Return top learned terms for smart bar
    return Object.entries(this.learnedTerms)
      .sort((a,b)=>b[1].count-a[1].count)
      .slice(0,8)
      .map(([term,data])=>({term,count:data.count}));
  }
  
  renderSmartBar(){
    const bar=document.getElementById('smart-bar');
    const suggestions=this.getSuggestions();
    const chips=['🔍 Search','▶️ Video','🐙 Code','🎵 Music','🤖 AI','📚 Learn'];
    
    let html='<span style="color:var(--text2);font-size:11px;margin-right:8px">Quick:</span>';
    chips.forEach(chip=>{
      const icon=chip.split(' ')[0];
      const label=chip.split(' ')[1];
      html+=`<span class="smart-chip" onclick="smartSearch.quickSearch('${label.toLowerCase()}')"><span class="chip-icon">${icon}</span>${label}</span>`;
    });
    
    if(suggestions.length>0){
      html+='<span style="color:var(--text2);font-size:11px;margin:0 8px">|</span>';
      html+='<span style="color:var(--text2);font-size:11px;margin-right:8px">Your history:</span>';
      suggestions.slice(0,4).forEach(s=>{
        html+=`<span class="smart-chip" onclick="smartSearch.searchFor('${s.term}')">${s.term.substring(0,12)}<span style="color:var(--accent);margin-left:4px">${s.count}x</span></span>`;
      });
    }
    
    bar.innerHTML=html;
  }
  
  quickSearch(type){
    const searches={video:'youtube.com',code:'github.com',music:'spotify.com',ai:'chat.openai.com',learn:'wikipedia.org'};
    const url=searches[type]||'google.com';
    document.getElementById('frame').src='https://'+url;
  }
  
  searchFor(term){
    document.getElementById('frame').src='https://google.com/search?q='+encodeURIComponent(term);
  }
}

const smartSearch=new SmartSearch();

// Tab system
var tabs=[{id:1,url:'https://google.com',title:'New Tab'}];
var activeTab=1;
var tabId=2;

function renderTabs(){
  document.getElementById('tabs').innerHTML=tabs.map(t=>'<button class="tab '+(t.id===activeTab?'active':'')+'" data-id="'+t.id+'"><span class="tab-title">'+(t.title||'New Tab')+'</span><span class="tab-close" onclick="event.stopPropagation();closeTab('+t.id+')">×</span></button>').join('')+'<button class="new-tab" onclick="newTab()">+</button>';
  document.querySelectorAll('.tab').forEach(el=>el.onclick=function(){switchTab(parseInt(this.dataset.id))});
}

function newTab(){var id=tabId++;tabs.push({id,url:'https://google.com',title:'New Tab'});switchTab(id);}
function closeTab(id){if(tabs.length<=1)return;var idx=tabs.findIndex(t=>t.id===id);tabs.splice(idx,1);if(activeTab===id||!tabs.find(t=>t.id===activeTab)){activeTab=tabs[Math.max(0,idx-1)].id;}renderTabs();loadTab(activeTab);}
function switchTab(id){activeTab=id;renderTabs();loadTab(id);}
function loadTab(id){var t=tabs.find(tab=>tab.id===id);document.getElementById('frame').src=t.url;document.getElementById('urlbar').value=t.url;}

// URL Bar with Smart Suggestions
const urlbar=document.getElementById('urlbar');
const suggestions=document.getElementById('suggestions');

urlbar.oninput=function(){
  const query=this.value.trim();
  if(query.length<1){suggestions.classList.remove('show');return;}
  
  const results=smartSearch.search(query);
  
  if(results.length>0){
    suggestions.innerHTML=results.map(r=>'<div class="suggestion" onclick="goTo(\''+r.url+'\')"><span class="suggestion-icon">'+(r.icon||'🔗')+'</span><div class="suggestion-text"><div class="suggestion-title">'+(r.title||r.name)+'</div><div class="suggestion-url">'+r.url+'</div></div>'+(r.type==='learned'?'<span class="suggestion-count">'+r.count+'x</span>':'')+'</div>').join('');
    suggestions.classList.add('show');
  }else{
    suggestions.classList.remove('show');
  }
};

urlbar.onkeydown=function(e){
  if(e.key==='Enter'){
    const query=this.value.trim();
    if(query){
      let url=query;
      if(!query.startsWith('http')&&!query.includes('.')&&!query.startsWith('localhost')){
        url='https://google.com/search?q='+encodeURIComponent(query);
      }else if(!query.startsWith('http')){
        url='https://'+query;
      }
      goTo(url);
    }
    suggestions.classList.remove('show');
  }
};

function goTo(url){
  document.getElementById('frame').src=url;
  var t=tabs.find(tab=>tab.id===activeTab);
  if(t){t.url=url;t.title=url;}
  document.getElementById('urlbar').value=url;
  suggestions.classList.remove('show');
  
  // Learn from this search
  smartSearch.addToHistory(urlbar.value);
}

// Navigation
document.getElementById('back').onclick=function(){try{frames[0].history.back()}catch(e){}};
document.getElementById('forward').onclick=function(){try{frames[0].history.forward()}catch(e){}};
document.getElementById('refresh').onclick=function(){document.getElementById('frame').src=document.getElementById('frame').src};
document.getElementById('home').onclick=function(){goTo('https://google.com')};

// Close suggestions when clicking elsewhere
document.addEventListener('click',function(e){
  if(!e.target.closest('#urlbar')&&!e.target.closest('#suggestions')){
    suggestions.classList.remove('show');
  }
});

// Update URL when page loads
document.getElementById('frame').onload=function(){
  try{
    var t=tabs.find(tab=>tab.id===activeTab);
    if(t){
      t.title=document.getElementById('frame').contentDocument.title;
      renderTabs();
    }
    document.getElementById('urlbar').value=document.getElementById('frame').contentWindow.location.href;
  }catch(e){}
};

renderTabs();
</script>
</body>
</html>
