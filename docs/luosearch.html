<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luo Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0a0a0f;
            --bg-secondary: #12121a;
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-tertiary: rgba(255,255,255,0.5);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .brand {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tagline {
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-size: 14px;
        }
        
        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }
        
        .search-box {
            width: 100%;
            padding: 18px 24px;
            padding-left: 60px;
            font-size: 18px;
            background: var(--bg-secondary);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: var(--text);
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.2);
        }
        
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
        }
        
        .results {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }
        
        .result {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .result:hover {
            background: rgba(99,102,241,0.1);
            border-color: var(--primary);
            transform: translateX(5px);
        }
        
        .result-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .result-info {
            flex: 1;
        }
        
        .result-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .result-keywords {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        .result-category {
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(99,102,241,0.2);
            border-radius: 20px;
            color: var(--primary);
        }
        
        .shortcuts {
            margin-top: 60px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .shortcut {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .shortcut kbd {
            background: var(--bg-secondary);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .footer {
            margin-top: auto;
            padding-top: 40px;
            color: var(--text-tertiary);
            font-size: 12px;
        }
        
        .powered {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="logo">🔍</div>
    <div class="brand">Luo Search</div>
    <div class="tagline">Search. Discover. Create.</div>
    
    <div class="search-container">
        <span class="search-icon">🌐</span>
        <input type="text" class="search-box" id="searchInput" placeholder="Search or type a URL..." autofocus>
    </div>
    
    <div class="results" id="results"></div>
    
    <div class="shortcuts">
        <div class="shortcut"><kbd>↵</kbd> to select</div>
        <div class="shortcut"><kbd>↑↓</kbd> to navigate</div>
        <div class="shortcut"><kbd>esc</kbd> to clear</div>
    </div>
    
    <div class="footer">
        Powered by <span class="powered">Luo Desktop</span> • Privacy First
    </div>
    
    <script src="luo-search.js"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('results');
        let selectedIndex = 0;
        let currentResults = [];

        // Show initial results
        showResults(luoSearch.getDefaultResults());

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            const results = luoSearch.search(query);
            showResults(results);
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedIndex = Math.min(selectedIndex + 1, currentResults.length - 1);
                updateSelection();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedIndex = Math.max(selectedIndex - 1, 0);
                updateSelection();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (currentResults[selectedIndex]) {
                    window.location.href = currentResults[selectedIndex].url;
                }
            } else if (e.key === 'Escape') {
                searchInput.value = '';
                showResults(luoSearch.getDefaultResults());
            }
        });

        function showResults(results) {
            currentResults = results;
            selectedIndex = 0;
            
            if (results.length === 0) {
                resultsContainer.innerHTML = '<div style="text-align:center;color:var(--text-tertiary);padding:20px;">No results found</div>';
                return;
            }

            resultsContainer.innerHTML = results.map((result, i) => `
                <div class="result ${i === selectedIndex ? 'selected' : ''}" data-index="${i}">
                    <div class="result-icon">${getCategoryIcon(result.category)}</div>
                    <div class="result-info">
                        <div class="result-name">${result.name}</div>
                        <div class="result-keywords">${result.keywords}</div>
                    </div>
                    <div class="result-category">${result.category}</div>
                </div>
            `).join('');

            // Add click handlers
            document.querySelectorAll('.result').forEach(el => {
                el.addEventListener('click', () => {
                    const index = parseInt(el.dataset.index);
                    window.location.href = results[index].url;
                });
            });
        }

        function updateSelection() {
            document.querySelectorAll('.result').forEach((el, i) => {
                el.classList.toggle('selected', i === selectedIndex);
            });
        }

        function getCategoryIcon(category) {
            const icons = {
                search: '🔍',
                video: '🎬',
                social: '💬',
                dev: '💻',
                reference: '📚',
                shopping: '🛒',
                entertainment: '🎮',
                music: '🎵',
                ai: '🤖',
                crypto: '🪙',
                blog: '✍️'
            };
            return icons[category] || '🌐';
        }
    </script>
</body>
</html>
