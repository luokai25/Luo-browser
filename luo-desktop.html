<!DOCTYPE html>
<html>
<head>
<title>Luo Desktop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0a0a0f;color:#fff;height:100vh;overflow:hidden}
#desktop{position:relative;height:calc(100vh - 50px);padding:20px;display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start;width:250px}
#taskbar{position:fixed;bottom:0;left:0;width:100%;height:50px;background:rgba(20,20,30,0.95);display:flex;align-items:center;padding:0 10px;gap:5px;border-top:1px solid #333}
.dock-item{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border-radius:10px;transition:0.2s;background:none;border:none;color:#fff}
.dock-item:hover{background:rgba(255,255,255,0.2)}
.icon{display:flex;flex-direction:column;align-items:center;gap:4px;width:70px;padding:10px;cursor:pointer;border-radius:12px}
.icon:hover{background:rgba(255,255,255,0.15)}
.icon span:first-child{font-size:32px}
.icon span:last-child{font-size:11px;text-shadow:0 1px 2px #000}
.window{position:absolute;background:rgba(20,20,35,0.98);border:1px solid #333;border-radius:12px;min-width:400px;min-height:300px;display:flex;flex-direction:column;overflow:hidden}
.window-header{display:flex;justify-content:space-between;padding:10px;background:rgba(30,30,45,0.98);cursor:move}
.window-title{display:flex;gap:8px;align-items:center;font-size:13px}
.window-btns{display:flex;gap:6px}
.win-btn{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer}
.win-btn.close{background:#f44}.win-btn.min{background:#fb4}.win-btn.max{background:#4b4}
.window-content{flex:1;overflow:hidden}
.window-content iframe{width:100%;height:100%;border:none}
#windows{position:fixed;top:0;left:0;width:100%;height:calc(100vh - 50px);pointer-events:none;z-index:100}
#windows>*{pointer-events:auto}
</style>
</head>
<body>
<div id="desktop"></div>
<div id="windows"></div>
<div id="taskbar"></div>
<script>
var apps=[
  {id:'browser',icon:'🌐',name:'Browser'},
  {id:'files',icon:'📁',name:'Files'},
  {id:'terminal',icon:'⌨️',name:'Terminal'},
  {id:'settings',icon:'⚙️',name:'Settings'},
  {id:'calc',icon:'🧮',name:'Calculator'}
];
var z=1;
function init(){
  document.getElementById('desktop').innerHTML=apps.map(a=>'<div class="icon" onclick="openApp(\''+a.id+'\')"><span>'+a.icon+'</span><span>'+a.name+'</span></div>').join('');
  document.getElementById('taskbar').innerHTML=apps.map(a=>'<button class="dock-item" onclick="openApp(\''+a.id+'\')">'+a.icon+'</button>').join('');
}
function openApp(id){
  var app=apps.find(function(a){return a.id===id});
  if(!app)app={name:id,icon:'📄'};
  var win=document.createElement('div');
  win.className='window';
  win.style.cssText='left:80px;top:40px;width:800px;height:500px;z-index:'+(++z);
  win.innerHTML='<div class="window-header"><div class="window-title"><span>'+(app.icon||'📄')+'</span><span>'+app.name+'</span></div><div class="window-btns"><button class="win-btn min"></button><button class="win-btn max"></button><button class="win-btn close" onclick="this.parentElement.parentElement.parentElement.remove()"></button></div></div><div class="window-content" id="win-'+id+'"></div>';
  document.getElementById('windows').appendChild(win);
  loadApp(id);
}
function loadApp(id){
  var c=document.getElementById('win-'+id);
  if(id==='browser')c.innerHTML='<iframe src="browser.html"></iframe>';
  else if(id==='calc')c.innerHTML='<div style="padding:20px"><h2>Calculator</h2><p>Coming soon!</p></div>';
  else if(id==='terminal')c.innerHTML='<pre style="color:#0f0;padding:10px">Luo Terminal v1.0\n$ _</pre>';
  else c.innerHTML='<div style="padding:20px"><h2>'+apps.find(function(a){return a.id===id}).name+'</h2><p>App content</p></div>';
}
init();
</script>
</body>
</html>
